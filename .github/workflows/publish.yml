name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run npm publish in dry-run mode"
        required: true
        type: boolean
        default: true

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure workflow is running on master
        run: |
          if [[ "${GITHUB_REF}" != "refs/heads/master" ]]; then
            echo "ERROR: publish workflow must run from refs/heads/master (current: ${GITHUB_REF})."
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Read package version
        id: version
        run: |
          VERSION="$(node -e 'console.log(JSON.parse(require("node:fs").readFileSync("package.json","utf8")).version)')"
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate version format (YYYY.M.D[-N])
        run: >-
          node -e "const v=process.env.VERSION; const ok=/^[1-9][0-9]{3}\\.(1[0-2]|[1-9])\\.(3[01]|[12][0-9]|[1-9])(?:-([2-9]|[1-9][0-9]+))?$/.test(v); if(!ok){console.error('ERROR: invalid version format: '+v); process.exit(1);}"
        env:
          VERSION: ${{ steps.version.outputs.value }}

      - name: Ensure git tag does not already exist
        if: inputs.dry_run == false
        run: |
          TAG="v${{ steps.version.outputs.value }}"
          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "ERROR: Tag ${TAG} already exists."
            exit 1
          fi

      - name: Verify release quality gates
        run: bun run release:verify

      - name: Package smoke (npx + bunx)
        run: bun run release:dry-run

      - name: Publish to npm (dry-run)
        if: inputs.dry_run == true
        run: npm publish --access public --provenance --dry-run

      - name: Publish to npm
        if: inputs.dry_run == false
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release notes
        if: inputs.dry_run == false
        run: bun run release:notes > RELEASE_NOTES.md

      - name: Create GitHub Release
        if: inputs.dry_run == false
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: Release v${{ steps.version.outputs.value }}
          body_path: RELEASE_NOTES.md
