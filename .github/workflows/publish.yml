name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish, for example v2026.7.21"
        required: true
        type: string

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: release
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate tag and synchronized versions
        run: node scripts/release/version.mjs check --tag "$RELEASE_TAG"

      - name: Verify release quality gates
        run: bun run release:verify

      - name: Verify generated pm changelog
        run: bun run changelog:pm:check

      - name: Package smoke (npx + bunx)
        run: bun run release:dry-run

      - name: Publish package for npm and Bun consumers
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          if npm view "@unbrained/homeassistant-cli@${version}" version --json >/dev/null 2>&1; then
            echo "Version ${version} is already published; skipping duplicate publication."
          else
            npm publish --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify npm, npx, Bun, and bunx consumption
        run: node scripts/release/verify-published.mjs --tag "$RELEASE_TAG"

      - name: Create GitHub release notes
        run: bun run release:notes > RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Release ${{ env.RELEASE_TAG }}
          body_path: RELEASE_NOTES.md
