name: Release Dry Run

on:
  workflow_dispatch:

concurrency:
  group: release-dry-run-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release quality gates
        run: bun run release:verify

      - name: Package smoke (npx + bunx)
        run: bun run release:dry-run

      - name: Generate release notes preview
        run: bun run release:notes > RELEASE_NOTES_PREVIEW.md

      - name: Upload release notes preview
        uses: actions/upload-artifact@v7
        with:
          name: release-notes-preview
          path: RELEASE_NOTES_PREVIEW.md
          if-no-files-found: error
