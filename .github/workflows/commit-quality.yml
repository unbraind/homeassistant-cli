name: Commit Quality

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: commit-quality-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  pull-requests: read

jobs:
  pr-title:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate PR title with Conventional Commits
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            test
            refactor
            chore
            perf
          requireScope: false

  commit-audit:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Audit commit message quality
        run: bash scripts/git/audit-commit-messages.sh
